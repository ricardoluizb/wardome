<!-- web/play.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wardome Reborn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="layout">
    <div id="side-panel" class="ornate-frame">
      <div id="level-up-flash">LEVEL UP!</div>
      <h1 id="game-title">WARDOME II - REBORN</h1>
      <button id="equipment-toggle" type="button">Equipment</button>
      <button id="automation-toggle" type="button">Automation</button>
      <img id="room-art" src="assets/rooms/placeholder.jpg" alt="Room illustration">
      <h2>Room</h2>
      <div id="room-id">—</div>
      <hr class="hud-divider">
      <h2 class="hud-heading">Status</h2>
      <div id="hud">
        <div class="stat-bar-row">
          <span class="stat-label">HP</span>
          <div class="stat-bar"><div id="hp-bar-fill" class="stat-bar-fill"></div></div>
          <span id="hp-text" class="stat-value">—/—</span>
        </div>
        <div class="stat-bar-row">
          <span class="stat-label">MP</span>
          <div class="stat-bar"><div id="mana-bar-fill" class="stat-bar-fill"></div></div>
          <span id="mana-text" class="stat-value">—/—</span>
        </div>
        <div class="stat-bar-row">
          <span class="stat-label">MV</span>
          <div class="stat-bar"><div id="move-bar-fill" class="stat-bar-fill"></div></div>
          <span id="move-text" class="stat-value">—/—</span>
        </div>
        <hr class="hud-divider">
        <div id="affects-list"></div>
        <hr class="hud-divider">
        <div id="bottom-stats">
          <hr class="hud-divider">
          <div class="stat-bar-row">
            <span id="level-label" class="stat-label level-label">Lvl —</span>
            <div class="stat-bar"><div id="xp-bar-fill" class="stat-bar-fill"></div><span id="xp-percent" class="bar-percent-label"></span></div>
            <span id="xp-text" class="stat-value">—/—</span>
          </div>
          <hr class="hud-divider">
          <div id="gold-line"><span id="gold-icon" aria-hidden="true">🪙</span> <span id="gold-text">—</span> gold</div>
        </div>
      </div>
    </div>
    <div id="equipment-overlay" class="ornate-frame">
      <button id="equipment-close" type="button">&times;</button>
      <h2 id="equipment-title">Equipment</h2>
      <div id="equipment-grid">
        <div class="equip-slot" data-label="Ear" style="grid-area: ear-l;"><div class="equip-icon-box"><img id="equip-icon-ear-l" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Head" style="grid-area: head;"><div class="equip-icon-box"><img id="equip-icon-head" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Ear" style="grid-area: ear-r;"><div class="equip-icon-box"><img id="equip-icon-ear-r" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Face" style="grid-area: face;"><div class="equip-icon-box"><img id="equip-icon-face" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Neck" style="grid-area: neck-1;"><div class="equip-icon-box"><img id="equip-icon-neck-1" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Neck" style="grid-area: neck-2;"><div class="equip-icon-box"><img id="equip-icon-neck-2" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Cloak" style="grid-area: about;"><div class="equip-icon-box"><img id="equip-icon-about" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Arms" style="grid-area: arms;"><div class="equip-icon-box"><img id="equip-icon-arms" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Body" style="grid-area: body;"><div class="equip-icon-box"><img id="equip-icon-body" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Shield" style="grid-area: shield;"><div class="equip-icon-box"><img id="equip-icon-shield" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Wrist" style="grid-area: wrist-l;"><div class="equip-icon-box"><img id="equip-icon-wrist-l" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Hands" style="grid-area: hands;"><div class="equip-icon-box"><img id="equip-icon-hands" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Wrist" style="grid-area: wrist-r;"><div class="equip-icon-box"><img id="equip-icon-wrist-r" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Waist" style="grid-area: waist;"><div class="equip-icon-box"><img id="equip-icon-waist" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Ring" style="grid-area: ring-l;"><div class="equip-icon-box"><img id="equip-icon-ring-l" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Ring" style="grid-area: ring-r;"><div class="equip-icon-box"><img id="equip-icon-ring-r" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Legs" style="grid-area: legs;"><div class="equip-icon-box"><img id="equip-icon-legs" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Feet" style="grid-area: feet;"><div class="equip-icon-box"><img id="equip-icon-feet" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Hold" style="grid-area: hold;"><div class="equip-icon-box"><img id="equip-icon-hold" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="2H" style="grid-area: dwield;"><div class="equip-icon-box"><img id="equip-icon-dwield" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Wield" style="grid-area: wield;"><div class="equip-icon-box"><img id="equip-icon-wield" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Light" style="grid-area: light;"><div class="equip-icon-box"><img id="equip-icon-light" class="equip-icon"></div></div>
        <div class="equip-slot" data-label="Float" style="grid-area: float;"><div class="equip-icon-box"><img id="equip-icon-float" class="equip-icon"></div></div>
      </div>
    </div>
    <div id="automation-overlay" class="ornate-frame">
      <button id="automation-close" type="button">&times;</button>
      <h2 id="automation-title">Automation</h2>
      <div id="automation-master-row">
        <span>Enabled</span>
        <input id="automation-master-toggle" type="checkbox" checked>
      </div>
      <div id="automation-list"></div>
      <div id="automation-hint">Define with: <code>#alias</code>, <code>#trigger name "pat" cmd</code>, <code>#timer name 30 cmd</code>, <code>#delay 30 cmd</code>. Manage with <code>#list</code>, <code>#del name</code>, <code>#on</code>/<code>#off name</code>.</div>
    </div>
    <div id="terminal-panel" class="ornate-frame">
      <pre id="output"></pre>
      <form id="input-form">
        <input id="command-input" type="text" autocomplete="off" autofocus placeholder="type a command...">
      </form>
    </div>
  </div>
  <script src="client.js"></script>
</body>
</html>
