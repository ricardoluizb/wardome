<!-- web/play.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wardome Reborn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="layout">
    <div id="side-panel" class="ornate-frame">
      <h1 id="game-title">WARDOME II - REBORN</h1>
      <img id="room-art" src="assets/rooms/placeholder.jpg" alt="Room illustration">
      <h2>Room</h2>
      <div id="room-id">—</div>
      <hr class="hud-divider">
      <h2 class="hud-heading">Status</h2>
      <div id="hud">
        <div class="stat-bar-row">
          <span class="stat-label">HP</span>
          <div class="stat-bar"><div id="hp-bar-fill" class="stat-bar-fill"></div></div>
          <span id="hp-text" class="stat-value">—/—</span>
        </div>
        <div class="stat-bar-row">
          <span class="stat-label">MP</span>
          <div class="stat-bar"><div id="mana-bar-fill" class="stat-bar-fill"></div></div>
          <span id="mana-text" class="stat-value">—/—</span>
        </div>
        <div class="stat-bar-row">
          <span class="stat-label">MV</span>
          <div class="stat-bar"><div id="move-bar-fill" class="stat-bar-fill"></div></div>
          <span id="move-text" class="stat-value">—/—</span>
        </div>
        <hr class="hud-divider">
        <div id="bottom-stats">
          <hr class="hud-divider">
          <div class="stat-bar-row">
            <span id="level-label" class="stat-label level-label">Lvl —</span>
            <div class="stat-bar"><div id="xp-bar-fill" class="stat-bar-fill"></div><span id="xp-percent" class="bar-percent-label"></span></div>
            <span id="xp-text" class="stat-value">—/—</span>
          </div>
          <hr class="hud-divider">
          <div id="gold-line"><span id="gold-icon" aria-hidden="true">🪙</span> <span id="gold-text">—</span> gold</div>
        </div>
      </div>
    </div>
    <div id="terminal-panel" class="ornate-frame">
      <pre id="output"></pre>
      <form id="input-form">
        <input id="command-input" type="text" autocomplete="off" autofocus placeholder="type a command...">
      </form>
    </div>
  </div>
  <script src="client.js"></script>
</body>
</html>
