events {}

http {
  include       mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(?:html|js|css|json)$ {
      add_header Cache-Control "no-cache";
      try_files $uri =404;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;

      # nginx's default proxy_read_timeout/proxy_send_timeout is 60s --
      # an idle-but-still-connected player (no input, no game events)
      # would get their WebSocket silently killed by nginx well before
      # the game server's own idle-void threshold (10-25 min, see
      # limits.c's check_idling/idle_void/idle_rent_time). Match the
      # longer, intentional server-side grace period instead. (Directives
      # aren't allowed inside the "if" block below, so set them here --
      # harmless for the static-file fallback path too.)
      proxy_read_timeout 1800s;
      proxy_send_timeout 1800s;

      if ($http_upgrade = "websocket") {
        proxy_pass http://bridge:8080;
        break;
      }
      try_files $uri $uri/ =404;
    }
  }
}
